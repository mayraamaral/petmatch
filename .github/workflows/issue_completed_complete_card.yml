name: Move Trello card to Completed List on issue completed

on:
  issues:
    types: [closed]

permissions:
  issues: read

concurrency:
  group: trello-issue-completed-${{ github.event.issue.id }}
  cancel-in-progress: false

jobs:
  move_trello_card_on_issue_completed:
    if: github.event.issue.state_reason == 'completed'
    runs-on: ubuntu-latest
    environment: dev
    name: Move Trello Card to Completed List

    steps:
      - name: Move related Trello card to Completed List
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}

          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}

          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_API_TOKEN: ${{ secrets.TRELLO_API_TOKEN }}
          TRELLO_LIST_ID: ${{ secrets.TRELLO_LIST_ID }}
          TRELLO_COMPLETED_LIST_ID: ${{ secrets.TRELLO_COMPLETED_LIST_ID }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.parse
          import urllib.request

          required = [
              "GH_TOKEN",
              "GITHUB_API_URL",
              "GITHUB_REPOSITORY",
              "ISSUE_NUMBER",
              "ISSUE_URL",
              "TRELLO_API_KEY",
              "TRELLO_API_TOKEN",
              "TRELLO_LIST_ID",
              "TRELLO_COMPLETED_LIST_ID",
          ]
          missing = [k for k in required if not os.environ.get(k)]
          if missing:
              raise SystemExit(f"Missing required env/secrets: {', '.join(missing)}")

          issue_number = os.environ["ISSUE_NUMBER"]
          issue_url = os.environ["ISSUE_URL"]
          completed_list_id = os.environ["TRELLO_COMPLETED_LIST_ID"]

          def http_json(url, method="GET", data=None, headers=None):
              req = urllib.request.Request(
                  url,
                  data=data,
                  method=method,
                  headers=headers or {},
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      raw = resp.read().decode("utf-8")
                      if not raw:
                          return None
                      try:
                          return json.loads(raw)
                      except json.JSONDecodeError:
                          return raw
              except urllib.error.HTTPError as e:
                  detail = e.read().decode("utf-8", errors="ignore")
                  raise SystemExit(f"HTTP {e.code} error on {method} {url}\n{detail}")

          def trello_request(method, path, params=None):
              query = {
                  "key": os.environ["TRELLO_API_KEY"],
                  "token": os.environ["TRELLO_API_TOKEN"],
              }
              if params:
                  query.update(params)

              url = f"https://api.trello.com/1{path}?{urllib.parse.urlencode(query)}"
              return http_json(
                  url,
                  method=method,
                  headers={"Accept": "application/json"},
              )

          def github_request(method, path, payload=None):
              data = None
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")

              url = f"{os.environ['GITHUB_API_URL']}/repos/{os.environ['GITHUB_REPOSITORY']}{path}"
              return http_json(
                  url,
                  method=method,
                  data=data,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )

          def extract_trello_card_ref_from_issue_comments():
              page = 1
              comments = []

              while True:
                  batch = github_request(
                      "GET",
                      f"/issues/{issue_number}/comments?per_page=100&page={page}"
                  ) or []

                  if not batch:
                      break

                  comments.extend(batch)

                  if len(batch) < 100:
                      break

                  page += 1

              for comment in reversed(comments):
                  body = comment.get("body") or ""
                  match = re.search(r"https://trello\.com/c/([A-Za-z0-9]+)", body)
                  if match:
                      return match.group(1)

              return None

          def fallback_find_card_in_backlog_list():
              cards = trello_request(
                  "GET",
                  f"/lists/{os.environ['TRELLO_LIST_ID']}/cards",
                  {"fields": "id,name,desc,idList"},
              ) or []

              expected_prefix = f"#{issue_number} - "

              for card in cards:
                  name = card.get("name") or ""
                  desc = card.get("desc") or ""
                  if name.startswith(expected_prefix) or issue_url in desc:
                      return card["id"]

              return None

          def resolve_card(card_ref):
              return trello_request(
                  "GET",
                  f"/cards/{card_ref}",
                  {"fields": "id,name,idList,url"},
              )

          card_ref = extract_trello_card_ref_from_issue_comments()

          if not card_ref:
              card_ref = fallback_find_card_in_backlog_list()

          if not card_ref:
              raise SystemExit(
                  "Could not find the related Trello card for this issue."
              )

          card = resolve_card(card_ref)
          card_id = card["id"]
          current_list_id = card.get("idList")

          if current_list_id == completed_list_id:
              print(f"Trello card for issue #{issue_number} is already in Completed List.")
              raise SystemExit(0)

          trello_request(
              "PUT",
              f"/cards/{card_id}",
              {"idList": completed_list_id},
          )

          print(f"Moved Trello card for issue #{issue_number} to Completed List.")
          PY
