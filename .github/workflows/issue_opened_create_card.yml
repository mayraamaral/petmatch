name: Create Trello card on opened issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  create_trello_card_job:
    runs-on: ubuntu-latest
    environment: dev
    name: Create Trello Card

    steps:
      - name: Create Trello card and comment on issue
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}

          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}

          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_API_TOKEN: ${{ secrets.TRELLO_API_TOKEN }}
          TRELLO_LIST_ID: ${{ secrets.TRELLO_LIST_ID }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import urllib.parse
          import urllib.request

          required = [
              "TRELLO_API_KEY",
              "TRELLO_API_TOKEN",
              "TRELLO_LIST_ID",
              "GH_TOKEN",
          ]
          missing = [k for k in required if not os.environ.get(k)]
          if missing:
              raise SystemExit(f"Missing required env/secrets: {', '.join(missing)}")

          issue_number = os.environ["ISSUE_NUMBER"]
          issue_title = os.environ["ISSUE_TITLE"]
          issue_body = os.environ.get("ISSUE_BODY") or ""
          issue_url = os.environ["ISSUE_URL"]
          issue_author = os.environ["ISSUE_AUTHOR"]

          def trello_request(method, path, params=None):
              query = {
                  "key": os.environ["TRELLO_API_KEY"],
                  "token": os.environ["TRELLO_API_TOKEN"],
              }
              if params:
                  query.update(params)

              url = f"https://api.trello.com/1{path}?{urllib.parse.urlencode(query)}"
              req = urllib.request.Request(
                  url,
                  method=method,
                  headers={"Accept": "application/json"},
              )

              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          # Extrai checklist do markdown da issue:
          # - [ ] item
          # - [x] item
          task_pattern = re.compile(r"^\s*-\s\[( |x|X)\]\s+(.+?)\s*$", re.MULTILINE)
          task_matches = task_pattern.findall(issue_body)

          task_items = [
              {
                  "name": text.strip(),
                  "checked": mark.lower() == "x",
              }
              for mark, text in task_matches
          ]

          trello_name = f"#{issue_number} - {issue_title}"
          trello_desc = (
              f"GitHub issue: {issue_url}\n"
              f"Author: @{issue_author}\n\n"
              f"{issue_body}"
          )

          # 1) Cria o card
          card = trello_request(
              "POST",
              "/cards",
              {
                  "idList": os.environ["TRELLO_LIST_ID"],
                  "name": trello_name,
                  "desc": trello_desc,
              },
          )

          # 2) Só cria checklist se encontrou itens no formato - [ ] ou - [x]
          if task_items:
              checklist = trello_request(
                  "POST",
                  f"/cards/{card['id']}/checklists",
                  {
                      "name": "Checklist",
                  },
              )

              for item in task_items:
                  trello_request(
                      "POST",
                      f"/checklists/{checklist['id']}/checkItems",
                      {
                          "name": item["name"],
                          "checked": "true" if item["checked"] else "false",
                      },
                  )

          # 3) Comenta na issue com o link do card
          comment_payload = json.dumps({
              "body": f"Foi criado o seguinte card no Trello: {card['url']}, na coluna de Backlog."
          }).encode("utf-8")

          gh_req = urllib.request.Request(
              f"{os.environ['GITHUB_API_URL']}/repos/{os.environ['GITHUB_REPOSITORY']}/issues/{issue_number}/comments",
              data=comment_payload,
              method="POST",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              },
          )

          with urllib.request.urlopen(gh_req) as resp:
              print(resp.read().decode("utf-8"))
          PY
