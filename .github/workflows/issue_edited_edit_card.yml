name: Sync Trello card on edited issues

on:
  issues:
    types: [edited]

permissions:
  issues: read

concurrency:
  group: trello-issue-${{ github.event.issue.id }}
  cancel-in-progress: true

jobs:
  sync_trello_card_job:
    runs-on: ubuntu-latest
    environment: dev
    name: Sync Trello Card

    steps:
      - name: Update related Trello card
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}

          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}

          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_API_TOKEN: ${{ secrets.TRELLO_API_TOKEN }}
          TRELLO_LIST_ID: ${{ secrets.TRELLO_LIST_ID }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.parse
          import urllib.request

          required = [
              "TRELLO_API_KEY",
              "TRELLO_API_TOKEN",
              "TRELLO_LIST_ID",
              "GH_TOKEN",
              "GITHUB_API_URL",
              "GITHUB_REPOSITORY",
              "ISSUE_NUMBER",
              "ISSUE_TITLE",
              "ISSUE_URL",
              "ISSUE_AUTHOR",
          ]
          missing = [k for k in required if not os.environ.get(k)]
          if missing:
              raise SystemExit(f"Missing required env/secrets: {', '.join(missing)}")

          issue_number = os.environ["ISSUE_NUMBER"]
          issue_title = os.environ["ISSUE_TITLE"]
          issue_body = os.environ.get("ISSUE_BODY") or ""
          issue_url = os.environ["ISSUE_URL"]
          issue_author = os.environ["ISSUE_AUTHOR"]

          def http_json(url, method="GET", data=None, headers=None):
              req = urllib.request.Request(
                  url,
                  data=data,
                  method=method,
                  headers=headers or {},
              )

              try:
                  with urllib.request.urlopen(req) as resp:
                      raw = resp.read().decode("utf-8")
                      if not raw:
                          return None
                      try:
                          return json.loads(raw)
                      except json.JSONDecodeError:
                          return raw
              except urllib.error.HTTPError as e:
                  detail = e.read().decode("utf-8", errors="ignore")
                  raise SystemExit(f"HTTP {e.code} error on {method} {url}\n{detail}")

          def trello_request(method, path, params=None):
              query = {
                  "key": os.environ["TRELLO_API_KEY"],
                  "token": os.environ["TRELLO_API_TOKEN"],
              }
              if params:
                  query.update(params)

              url = f"https://api.trello.com/1{path}?{urllib.parse.urlencode(query)}"
              return http_json(
                  url,
                  method=method,
                  headers={"Accept": "application/json"},
              )

          def github_request(method, path, payload=None):
              data = None
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")

              url = f"{os.environ['GITHUB_API_URL']}/repos/{os.environ['GITHUB_REPOSITORY']}{path}"
              return http_json(
                  url,
                  method=method,
                  data=data,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )

          def extract_trello_card_ref_from_issue_comments():
              """
              Procura o comentário automático que contém a URL do card.
              Ex.: https://trello.com/c/abc12345/17-titulo
              """
              page = 1
              comments = []

              while True:
                  batch = github_request(
                      "GET",
                      f"/issues/{issue_number}/comments?per_page=100&page={page}"
                  ) or []

                  if not batch:
                      break

                  comments.extend(batch)

                  if len(batch) < 100:
                      break

                  page += 1

              # Procura de trás pra frente, pegando o comentário mais recente com link do Trello
              for comment in reversed(comments):
                  body = comment.get("body") or ""
                  match = re.search(r"https://trello\.com/c/([A-Za-z0-9]+)", body)
                  if match:
                      return match.group(1)

              return None

          def fallback_find_card_in_backlog_list():
              """
              Fallback: procura na lista configurada pelo número da issue
              ou pela URL da issue dentro da descrição do card.
              """
              cards = trello_request(
                  "GET",
                  f"/lists/{os.environ['TRELLO_LIST_ID']}/cards",
                  {"fields": "id,name,desc,url,shortLink"},
              ) or []

              expected_prefix = f"#{issue_number} - "

              for card in cards:
                  name = card.get("name") or ""
                  desc = card.get("desc") or ""
                  if name.startswith(expected_prefix) or issue_url in desc:
                      return card["id"]

              return None

          def parse_markdown_checklist(text):
              pattern = re.compile(r"^\s*-\s\[( |x|X)\]\s+(.+?)\s*$", re.MULTILINE)
              matches = pattern.findall(text or "")
              return [
                  {
                      "name": item_text.strip(),
                      "checked": mark.lower() == "x",
                  }
                  for mark, item_text in matches
              ]

          card_ref = extract_trello_card_ref_from_issue_comments()

          if not card_ref:
              card_ref = fallback_find_card_in_backlog_list()

          if not card_ref:
              raise SystemExit(
                  "Could not find the related Trello card for this issue. "
                  "Check if the creation workflow already commented the Trello card URL on the issue."
              )

          task_items = parse_markdown_checklist(issue_body)

          trello_name = f"#{issue_number} - {issue_title}"
          trello_desc = (
              f"GitHub issue: {issue_url}\n"
              f"Author: @{issue_author}\n\n"
              f"{issue_body}"
          )

          # 1) Atualiza nome e descrição do card
          updated_card = trello_request(
              "PUT",
              f"/cards/{card_ref}",
              {
                  "name": trello_name,
                  "desc": trello_desc,
              },
          )

          card_id = updated_card["id"]

          # 2) Remove somente checklist(s) gerenciada(s) pelo GitHub
          existing_checklists = trello_request("GET", f"/cards/{card_id}/checklists") or []

          managed_checklist_names = {"checklist", "github checklist"}

          for checklist in existing_checklists:
              checklist_name = (checklist.get("name") or "").strip().lower()
              if checklist_name in managed_checklist_names:
                  trello_request("DELETE", f"/checklists/{checklist['id']}")

          # 3) Recria a checklist com base no markdown da issue
          if task_items:
              checklist = trello_request(
                  "POST",
                  f"/cards/{card_id}/checklists",
                  {
                      "name": "GitHub Checklist",
                  },
              )

              for item in task_items:
                  trello_request(
                      "POST",
                      f"/checklists/{checklist['id']}/checkItems",
                      {
                          "name": item["name"],
                          "checked": "true" if item["checked"] else "false",
                      },
                  )

          print(f"Trello card synced successfully: {updated_card.get('url')}")
          PY
