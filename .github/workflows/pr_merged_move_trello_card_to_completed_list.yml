name: Move Trello card to Completed List on PR merge

on:
  pull_request_target:
    types: [closed]

permissions:
  issues: read
  pull-requests: read

concurrency:
  group: trello-pr-merge-${{ github.event.pull_request.id }}
  cancel-in-progress: false

jobs:
  move_trello_card_on_merge:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: dev
    name: Move Trello Card to Completed List

    steps:
      - name: Move related Trello card(s) to Completed List
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_GRAPHQL_URL: ${{ github.graphql_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}

          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}

          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGED_AT: ${{ github.event.pull_request.merged_at }}

          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_API_TOKEN: ${{ secrets.TRELLO_API_TOKEN }}
          TRELLO_LIST_ID: ${{ secrets.TRELLO_LIST_ID }}
          TRELLO_COMPLETED_LIST_ID: ${{ secrets.TRELLO_COMPLETED_LIST_ID }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.parse
          import urllib.request
          from datetime import datetime

          required = [
              "GH_TOKEN",
              "GITHUB_API_URL",
              "GITHUB_GRAPHQL_URL",
              "GITHUB_REPOSITORY",
              "REPO_OWNER",
              "REPO_NAME",
              "PR_NUMBER",
              "MERGED_AT",
              "TRELLO_API_KEY",
              "TRELLO_API_TOKEN",
              "TRELLO_LIST_ID",
              "TRELLO_COMPLETED_LIST_ID",
          ]
          missing = [k for k in required if not os.environ.get(k)]
          if missing:
              raise SystemExit(f"Missing required env/secrets: {', '.join(missing)}")

          repository = os.environ["GITHUB_REPOSITORY"]
          repo_owner = os.environ["REPO_OWNER"]
          repo_name = os.environ["REPO_NAME"]
          pr_number = int(os.environ["PR_NUMBER"])
          completed_list_id = os.environ["TRELLO_COMPLETED_LIST_ID"]
          merged_at = os.environ["MERGED_AT"]

          def http_json(url, method="GET", data=None, headers=None):
              req = urllib.request.Request(
                  url,
                  data=data,
                  method=method,
                  headers=headers or {},
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      raw = resp.read().decode("utf-8")
                      if not raw:
                          return None
                      try:
                          return json.loads(raw)
                      except json.JSONDecodeError:
                          return raw
              except urllib.error.HTTPError as e:
                  detail = e.read().decode("utf-8", errors="ignore")
                  raise SystemExit(f"HTTP {e.code} error on {method} {url}\n{detail}")

          def github_rest_request(method, path, payload=None):
              data = None
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")

              url = f"{os.environ['GITHUB_API_URL']}/repos/{repository}{path}"
              return http_json(
                  url,
                  method=method,
                  data=data,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )

          def github_graphql(query, variables):
              payload = json.dumps({
                  "query": query,
                  "variables": variables,
              }).encode("utf-8")

              result = http_json(
                  os.environ["GITHUB_GRAPHQL_URL"],
                  method="POST",
                  data=payload,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                      "Content-Type": "application/json",
                  },
              )

              if result.get("errors"):
                  raise SystemExit(f"GitHub GraphQL error: {json.dumps(result['errors'])}")

              return result

          def trello_request(method, path, params=None):
              query = {
                  "key": os.environ["TRELLO_API_KEY"],
                  "token": os.environ["TRELLO_API_TOKEN"],
              }
              if params:
                  query.update(params)

              url = f"https://api.trello.com/1{path}?{urllib.parse.urlencode(query)}"
              return http_json(
                  url,
                  method=method,
                  headers={"Accept": "application/json"},
              )

          def get_linked_issue_numbers():
              graphql_query = """
              query($owner: String!, $name: String!, $number: Int!) {
                repository(owner: $owner, name: $name) {
                  pullRequest(number: $number) {
                    closingIssuesReferences(first: 50) {
                      nodes {
                        number
                        repository {
                          nameWithOwner
                        }
                      }
                    }
                  }
                }
              }
              """

              result = github_graphql(
                  graphql_query,
                  {
                      "owner": repo_owner,
                      "name": repo_name,
                      "number": pr_number,
                  },
              )

              nodes = (
                  result.get("data", {})
                        .get("repository", {})
                        .get("pullRequest", {})
                        .get("closingIssuesReferences", {})
                        .get("nodes", [])
              )

              issue_numbers = []
              for node in nodes:
                  repo = (node.get("repository") or {}).get("nameWithOwner")
                  if repo == repository:
                      issue_numbers.append(int(node["number"]))

              return sorted(set(issue_numbers))

          def find_trello_card_ref_from_issue_comments(issue_number):
              page = 1

              while True:
                  comments = github_rest_request(
                      "GET",
                      f"/issues/{issue_number}/comments?per_page=100&page={page}"
                  ) or []

                  if not comments:
                      break

                  for comment in reversed(comments):
                      body = comment.get("body") or ""
                      match = re.search(r"https://trello\.com/c/([A-Za-z0-9]+)", body)
                      if match:
                          return match.group(1)

                  if len(comments) < 100:
                      break

                  page += 1

              return None

          def fallback_find_card_in_list(issue_number):
              issue_url = f"https://github.com/{repository}/issues/{issue_number}"
              expected_prefix = f"#{issue_number} - "

              cards = trello_request(
                  "GET",
                  f"/lists/{os.environ['TRELLO_LIST_ID']}/cards",
                  {"fields": "id,name,desc,idList"},
              ) or []

              for card in cards:
                  name = card.get("name") or ""
                  desc = card.get("desc") or ""
                  if name.startswith(expected_prefix) or issue_url in desc:
                      return card["id"]

              return None

          def resolve_card(card_ref):
              return trello_request(
                  "GET",
                  f"/cards/{card_ref}",
                  {"fields": "id,name,idList,url"},
              )

          def trello_comment_exists(card_id, text):
              actions = trello_request(
                  "GET",
                  f"/cards/{card_id}/actions",
                  {
                      "filter": "commentCard",
                      "limit": 100,
                      "fields": "data",
                  },
              ) or []

              for action in actions:
                  action_text = ((action.get("data") or {}).get("text") or "").strip()
                  if action_text == text:
                      return True

              return False

          def format_date_pt_br(iso_datetime):
              dt = datetime.fromisoformat(iso_datetime.replace("Z", "+00:00"))
              meses = {
                  1: "janeiro",
                  2: "fevereiro",
                  3: "março",
                  4: "abril",
                  5: "maio",
                  6: "junho",
                  7: "julho",
                  8: "agosto",
                  9: "setembro",
                  10: "outubro",
                  11: "novembro",
                  12: "dezembro",
              }
              return f"{dt.day} de {meses[dt.month]} de {dt.year}"

          issue_numbers = get_linked_issue_numbers()

          if not issue_numbers:
              print("No linked issues found through closingIssuesReferences.")
              raise SystemExit(0)

          merged_date_text = format_date_pt_br(merged_at)
          merge_comment_text = f"O PR foi mergeado em {merged_date_text}"

          for issue_number in issue_numbers:
              card_ref = find_trello_card_ref_from_issue_comments(issue_number)

              if not card_ref:
                  card_ref = fallback_find_card_in_list(issue_number)

              if not card_ref:
                  print(f"Could not find Trello card for issue #{issue_number}. Skipping.")
                  continue

              card = resolve_card(card_ref)
              card_id = card["id"]
              current_list_id = card.get("idList")

              if current_list_id != completed_list_id:
                  trello_request(
                      "PUT",
                      f"/cards/{card_id}",
                      {"idList": completed_list_id},
                  )
                  print(f"Moved Trello card for issue #{issue_number} to Completed List.")
              else:
                  print(f"Trello card for issue #{issue_number} is already in Completed List.")

              if not trello_comment_exists(card_id, merge_comment_text):
                  trello_request(
                      "POST",
                      f"/cards/{card_id}/actions/comments",
                      {"text": merge_comment_text},
                  )
                  print(f"Added merge comment to Trello card for issue #{issue_number}.")
              else:
                  print(f"Merge comment already exists on Trello card for issue #{issue_number}.")
          PY
