name: Comment PR link on related Trello cards

on:
  pull_request_target:
    types: [opened, edited, reopened]

permissions:
  issues: read
  pull-requests: read

concurrency:
  group: trello-pr-link-${{ github.event.pull_request.id }}
  cancel-in-progress: true

jobs:
  comment_pr_link_on_trello:
    runs-on: ubuntu-latest
    environment: dev
    name: Comment PR link on Trello

    steps:
      - name: Add PR link comment to related Trello card(s)
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_GRAPHQL_URL: ${{ github.graphql_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}

          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}

          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_URL: ${{ github.event.pull_request.html_url }}

          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_API_TOKEN: ${{ secrets.TRELLO_API_TOKEN }}
          TRELLO_LIST_ID: ${{ secrets.TRELLO_LIST_ID }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.parse
          import urllib.request

          required = [
              "GH_TOKEN",
              "GITHUB_API_URL",
              "GITHUB_GRAPHQL_URL",
              "GITHUB_REPOSITORY",
              "REPO_OWNER",
              "REPO_NAME",
              "PR_NUMBER",
              "PR_URL",
              "TRELLO_API_KEY",
              "TRELLO_API_TOKEN",
              "TRELLO_LIST_ID",
          ]
          missing = [k for k in required if not os.environ.get(k)]
          if missing:
              raise SystemExit(f"Missing required env/secrets: {', '.join(missing)}")

          repo_owner = os.environ["REPO_OWNER"]
          repo_name = os.environ["REPO_NAME"]
          repository = os.environ["GITHUB_REPOSITORY"]
          pr_number = int(os.environ["PR_NUMBER"])
          pr_title = os.environ.get("PR_TITLE") or ""
          pr_body = os.environ.get("PR_BODY") or ""
          pr_url = os.environ["PR_URL"]

          def http_json(url, method="GET", data=None, headers=None):
              req = urllib.request.Request(
                  url,
                  data=data,
                  method=method,
                  headers=headers or {},
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      raw = resp.read().decode("utf-8")
                      if not raw:
                          return None
                      try:
                          return json.loads(raw)
                      except json.JSONDecodeError:
                          return raw
              except urllib.error.HTTPError as e:
                  detail = e.read().decode("utf-8", errors="ignore")
                  raise SystemExit(f"HTTP {e.code} error on {method} {url}\n{detail}")

          def github_rest_request(method, path, payload=None):
              data = None
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")

              url = f"{os.environ['GITHUB_API_URL']}/repos/{repository}{path}"
              return http_json(
                  url,
                  method=method,
                  data=data,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )

          def github_graphql(query, variables):
              payload = json.dumps({
                  "query": query,
                  "variables": variables,
              }).encode("utf-8")

              return http_json(
                  os.environ["GITHUB_GRAPHQL_URL"],
                  method="POST",
                  data=payload,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                      "Content-Type": "application/json",
                  },
              )

          def trello_request(method, path, params=None):
              query = {
                  "key": os.environ["TRELLO_API_KEY"],
                  "token": os.environ["TRELLO_API_TOKEN"],
              }
              if params:
                  query.update(params)

              url = f"https://api.trello.com/1{path}?{urllib.parse.urlencode(query)}"
              return http_json(
                  url,
                  method=method,
                  headers={"Accept": "application/json"},
              )

          def extract_issue_numbers_from_text(text):
              issue_numbers = set()

              # Matches #123
              for match in re.findall(r'(?<![A-Za-z0-9_])#(\d+)\b', text or ""):
                  issue_numbers.add(int(match))

              # Matches full issue URLs from the same repo
              repo_url_pattern = re.escape(f"https://github.com/{repository}/issues/")
              for match in re.findall(repo_url_pattern + r"(\d+)\b", text or ""):
                  issue_numbers.add(int(match))

              return issue_numbers

          def get_linked_issue_numbers():
              issue_numbers = set()

              # Best source: issues referenced by closing keywords in the PR
              graphql_query = """
              query($owner: String!, $name: String!, $number: Int!) {
                repository(owner: $owner, name: $name) {
                  pullRequest(number: $number) {
                    closingIssuesReferences(first: 50) {
                      nodes {
                        number
                        repository {
                          nameWithOwner
                        }
                      }
                    }
                  }
                }
              }
              """

              result = github_graphql(
                  graphql_query,
                  {
                      "owner": repo_owner,
                      "name": repo_name,
                      "number": pr_number,
                  },
              )

              if result.get("errors"):
                  raise SystemExit(f"GitHub GraphQL error: {json.dumps(result['errors'])}")

              nodes = (
                  result.get("data", {})
                        .get("repository", {})
                        .get("pullRequest", {})
                        .get("closingIssuesReferences", {})
                        .get("nodes", [])
              )

              for node in nodes:
                  if (node.get("repository") or {}).get("nameWithOwner") == repository:
                      issue_numbers.add(int(node["number"]))

              # Fallback: scan title/body for #123 or full issue URL
              issue_numbers.update(extract_issue_numbers_from_text(pr_title))
              issue_numbers.update(extract_issue_numbers_from_text(pr_body))

              return sorted(issue_numbers)

          def find_trello_card_ref_from_issue_comments(issue_number):
              page = 1

              while True:
                  comments = github_rest_request(
                      "GET",
                      f"/issues/{issue_number}/comments?per_page=100&page={page}"
                  ) or []

                  if not comments:
                      break

                  for comment in reversed(comments):
                      body = comment.get("body") or ""
                      match = re.search(r"https://trello\.com/c/([A-Za-z0-9]+)", body)
                      if match:
                          return match.group(1)

                  if len(comments) < 100:
                      break

                  page += 1

              return None

          def fallback_find_card_in_list(issue_number):
              issue_url = f"https://github.com/{repository}/issues/{issue_number}"
              expected_prefix = f"#{issue_number} - "

              cards = trello_request(
                  "GET",
                  f"/lists/{os.environ['TRELLO_LIST_ID']}/cards",
                  {"fields": "id,name,desc,url,shortLink"},
              ) or []

              for card in cards:
                  name = card.get("name") or ""
                  desc = card.get("desc") or ""
                  if name.startswith(expected_prefix) or issue_url in desc:
                      return card["id"]

              return None

          def resolve_card_id(card_ref):
              card = trello_request(
                  "GET",
                  f"/cards/{card_ref}",
                  {"fields": "id,name,url,shortLink"},
              )
              return card["id"]

          def trello_comment_exists(card_id, text):
              actions = trello_request(
                  "GET",
                  f"/cards/{card_id}/actions",
                  {
                      "filter": "commentCard",
                      "limit": 100,
                      "fields": "data",
                  },
              ) or []

              for action in actions:
                  action_text = ((action.get("data") or {}).get("text") or "").strip()
                  if action_text == text:
                      return True

              return False

          issue_numbers = get_linked_issue_numbers()

          if not issue_numbers:
              print("No linked issues found in this PR.")
              raise SystemExit(0)

          comment_text = f"Link do PR no Github: {pr_url}"

          for issue_number in issue_numbers:
              card_ref = find_trello_card_ref_from_issue_comments(issue_number)

              if not card_ref:
                  card_ref = fallback_find_card_in_list(issue_number)

              if not card_ref:
                  print(f"Could not find Trello card for issue #{issue_number}. Skipping.")
                  continue

              card_id = resolve_card_id(card_ref)

              if trello_comment_exists(card_id, comment_text):
                  print(f"Comment already exists on Trello card for issue #{issue_number}.")
                  continue

              trello_request(
                  "POST",
                  f"/cards/{card_id}/actions/comments",
                  {"text": comment_text},
              )

              print(f"Added PR link comment to Trello card for issue #{issue_number}.")
          PY
