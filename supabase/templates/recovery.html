<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar senha</title>
  </head>
  <body style="font-family: system-ui, sans-serif; line-height: 1.5; color: #111; max-width: 480px; margin: 0 auto; padding: 24px;">
    <h1 style="font-size: 1.25rem; margin: 0 0 16px;">Recupere a sua senha</h1>
    <p style="margin: 0 0 12px;">Cole o código abaixo no aplicativo:</p>
    <p style="font-size: 1.75rem; font-weight: 700; letter-spacing: 0.15em; margin: 16px 0;">{{ .Token }}</p>
    <p style="margin: 24px 0 0; font-size: 0.875rem; color: #555;">Se você não pediu isso, ignore este e-mail.</p>
  </body>
</html>
